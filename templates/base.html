<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiFi Sentinel</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav>
      <div class="nav-brand">🛡️ WiFi Sentinel</div>
      <div class="nav-links">
        <a
          href="{{ url_for('network') }}"
          class="{{ 'active' if request.endpoint == 'network' }}"
          >Network</a
        >
        <a
          href="{{ url_for('history') }}"
          class="{{ 'active' if request.endpoint == 'history' }}"
          >History</a
        >
        <a
          href="{{ url_for('flagged') }}"
          class="{{ 'active' if request.endpoint == 'flagged' }}"
          >Flagged</a
        >
        <a
          href="{{ url_for('settings') }}"
          class="{{ 'active' if request.endpoint == 'settings' }}"
          >Settings</a
        >
        <a href="{{ url_for('logout') }}" class="logout">Logout</a>
      </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
